name: Build iOS App

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches:
      - main

jobs:
  build:
    name: Build iOS (Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build:mobile

      - name: Sync Capacitor
        run: npx cap sync ios

      # We build for the iOS Simulator here because building for a physical device (.ipa)
      # requires an Apple Developer account, Certificates, and Provisioning Profiles.
      - name: Build iOS App (Simulator)
        working-directory: ./ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            build \
            CODE_SIGNING_ALLOWED=NO

      # Zip the resulting .app so it can be downloaded
      - name: Package Simulator App
        working-directory: ./ios/App
        run: |
          mkdir -p build/Build/Products/Debug-iphonesimulator
          # xcodebuild puts it in the derived data by default, let's specify derived data path to be sure
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' -derivedDataPath ./DerivedData build CODE_SIGNING_ALLOWED=NO
          cd DerivedData/Build/Products/Debug-iphonesimulator
          zip -r ../../../../App-Simulator.zip App.app

      - name: Upload iOS App Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/App/App-Simulator.zip
